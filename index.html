<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COCKPIT V3 — Flash IA — Karim Zoubdane 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0d1117;
--bg2: #161b22;
--bg3: #1c2333;
--bg4: #212842;
--border: #2a3045;
--border2: #3a4560;
--blue: #2f6fd4;
--blue-l: #4a8ae8;
--blue-dim: rgba(47,111,212,0.12);
--silver: #8b9ab5;
--text: #e2e8f0;
--text-m: #6b7fa3;
--white: #f8fafc;
--green: #22c55e;
--orange: #f59e0b;
--red: #ef4444;
--radius: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: 'Sora', sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
}

/* HEADER */
header {
background: var(--bg2);
border-bottom: 1px solid var(--border);
padding: 20px 32px;
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 16px;
position: sticky;
top: 0;
z-index: 50;
}

.logo {
font-size: 13px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--white);
}
.logo span { color: var(--blue-l); }

.header-stats {
display: flex;
gap: 24px;
align-items: center;
flex-wrap: wrap;
}

.hstat { text-align: center; }
.hstat-val { font-size: 22px; font-weight: 800; color: var(--white); line-height: 1; }
.hstat-lbl { font-size: 10px; color: var(--text-m); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.btn {
background: var(--blue);
color: #fff;
border: none;
padding: 9px 18px;
border-radius: 7px;
font-family: 'Sora', sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
transition: background 0.2s;
}
.btn:hover { background: var(--blue-l); }
.btn-ghost {
background: transparent;
border: 1px solid var(--border2);
color: var(--silver);
}
.btn-ghost:hover { border-color: var(--blue); color: var(--blue-l); background: var(--blue-dim); }

/* FLASH IA */
.flash-ia {
margin: 0 32px 20px 32px;
background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
border: 1px solid var(--blue);
border-radius: 12px;
padding: 20px;
}
.flash-header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 16px;
flex-wrap: wrap;
}
.flash-title { font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--blue-l); font-size: 13px; }
.flash-date { font-size: 11px; color: var(--text-m); margin-left: auto; }
.flash-content { font-size: 13px; line-height: 1.6; }
.flash-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 16px;
margin-bottom: 16px;
}
.flash-card {
background: rgba(255,255,255,0.03);
border-radius: 8px;
padding: 12px;
border: 1px solid var(--border);
}
.flash-card h4 {
font-size: 12px;
font-weight: 700;
margin-bottom: 8px;
color: var(--blue-l);
}
.flash-card p { font-size: 12px; color: var(--text-m); margin: 4px 0; }
.flash-emails {
background: rgba(107,127,163,0.05);
border-radius: 8px;
padding: 12px;
margin-top: 8px;
}
.email-item {
font-size: 12px;
padding: 6px 0;
border-bottom: 1px solid var(--border);
}
.loading {
text-align: center;
padding: 20px;
color: var(--text-m);
}
.error {
color: var(--orange);
text-align: center;
padding: 20px;
}

/* TOOLBAR */
.toolbar {
padding: 14px 32px;
display: flex;
gap: 8px;
align-items: center;
flex-wrap: wrap;
border-bottom: 1px solid var(--border);
background: var(--bg2);
}

.chip {
background: transparent;
border: 1px solid var(--border);
color: var(--text-m);
padding: 5px 14px;
border-radius: 20px;
font-size: 11px;
font-family: 'Sora', sans-serif;
font-weight: 500;
cursor: pointer;
text-transform: uppercase;
letter-spacing: 0.5px;
transition: all 0.15s;
}
.chip:hover, .chip.active {
background: var(--blue-dim);
border-color: var(--blue);
color: var(--blue-l);
}

.search-input {
margin-left: auto;
background: var(--bg3);
border: 1px solid var(--border);
color: var(--text);
padding: 6px 14px;
border-radius: 7px;
font-family: 'Sora', sans-serif;
font-size: 12px;
outline: none;
width: 220px;
transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--text-m); }

/* MAIN */
.main { padding: 28px 32px; }

.section-label {
font-size: 10px;
font-weight: 700;
letter-spacing: 2.5px;
text-transform: uppercase;
color: var(--text-m);
padding: 0 0 12px 2px;
border-bottom: 1px solid var(--border);
margin-bottom: 18px;
}

.section-block { margin-bottom: 40px; }

.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
gap: 16px;
}

/* CARD */
.card {
background: var(--bg2);
border: 1px solid var(--border);
border-radius: var(--radius);
padding: 20px;
cursor: pointer;
transition: all 0.2s;
position: relative;
display: flex;
flex-direction: column;
gap: 12px;
}
.card:hover {
border-color: var(--blue);
transform: translateY(-2px);
box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card-top {
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 10px;
}

.card-title {
font-size: 14px;
font-weight: 700;
color: var(--white);
line-height: 1.3;
}

.badge {
display: inline-flex;
align-items: center;
gap: 5px;
padding: 3px 9px;
border-radius: 12px;
font-size: 10px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
white-space: nowrap;
flex-shrink: 0;
}
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
.badge.actif { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
.badge.actif::before { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 1.5s infinite; }
.badge.planifie { background: rgba(107,127,163,0.12); color: var(--silver); border: 1px solid var(--border); }
.badge.planifie::before { background: var(--silver); }
.badge.termine { background: rgba(47,111,212,0.12); color: var(--blue-l); border: 1px solid rgba(47,111,212,0.25); }
.badge.termine::before { background: var(--blue-l); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.card-desc {
font-size: 12px;
color: var(--text-m);
line-height: 1.55;
border-left: 2px solid var(--border2);
padding-left: 10px;
}

.prog-row {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 11px;
color: var(--text-m);
}
.prog-pct { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--white); font-size: 13px; }
.prog-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 5px; }
.prog-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width 0.6s ease; }
.prog-fill.high { background: var(--green); }
.prog-fill.med { background: var(--blue); }
.prog-fill.low { background: var(--orange); }

.card-footer {
display: flex;
justify-content: space-between;
align-items: center;
padding-top: 10px;
border-top: 1px solid var(--border);
font-size: 11px;
color: var(--text-m);
}
.link-detail { color: var(--blue-l); font-size: 11px; font-weight: 600; }

/* MODAL */
.overlay {
position: fixed; inset: 0;
background: rgba(0,0,0,0.8);
backdrop-filter: blur(6px);
z-index: 100;
display: none;
padding: 20px;
overflow-y: auto;
}
.overlay.open { display: flex; align-items: flex-start; justify-content: center; }

.modal {
background: var(--bg2);
border: 1px solid var(--border2);
border-radius: 14px;
width: 100%;
max-width: 800px;
margin: auto;
overflow: hidden;
animation: fadeUp 0.25s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.modal-hdr {
background: var(--bg3);
padding: 24px 28px;
border-bottom: 1px solid var(--border);
display: flex;
align-items: flex-start;
gap: 14px;
position: relative;
}
.modal-hdr-text { flex: 1; }
.modal-hdr-title { font-size: 20px; font-weight: 800; color: var(--white); }
.modal-hdr-sub { font-size: 12px; color: var(--text-m); margin-top: 4px; line-height: 1.5; }
.btn-x {
position: absolute; top: 16px; right: 16px;
background: var(--bg4); border: 1px solid var(--border);
color: var(--silver); width: 30px; height: 30px;
border-radius: 50%; cursor: pointer; font-size: 14px;
display: flex; align-items: center; justify-content: center;
transition: all 0.15s;
}
.btn-x:hover { background: var(--red); color: #fff; border-color: var(--red); }

.modal-body { padding: 24px 28px; }

.modal-prog-bloc {
display: flex; gap: 20px; align-items: center;
background: var(--bg3);
border: 1px solid var(--border);
border-radius: var(--radius);
padding: 16px 20px;
margin-bottom: 20px;
}
.big-pct { font-size: 48px; font-weight: 800; color: var(--white); font-family: 'DM Mono', monospace; flex-shrink: 0; line-height: 1; }
.big-pct span { font-size: 22px; color: var(--silver); }
.prog-detail { flex: 1; }
.prog-detail-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 8px 0; }
.prog-detail-fill { height: 100%; background: var(--blue); border-radius: 3px; }
.prog-detail-label { font-size: 11px; color: var(--text-m); }

.phases-ttl {
font-size: 10px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; color: var(--text-m);
margin-bottom: 12px;
}

.phase {
margin-bottom: 12px;
border: 1px solid var(--border);
border-radius: 8px;
overflow: hidden;
}
.phase-hdr {
display: flex;
align-items: center;
gap: 10px;
padding: 11px 14px;
background: var(--bg3);
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.phase.done .dot { background: var(--green); }
.phase.in_progress .dot { background: var(--blue-l); animation: pulse 1.5s infinite; }
.phase.todo .dot { background: var(--border2); }
.phase-name { font-size: 13px; font-weight: 600; color: var(--white); flex: 1; }
.phase-tag {
font-size: 10px; font-weight: 700; text-transform: uppercase;
padding: 2px 8px; border-radius: 10px;
}
.phase.done .phase-tag { background: rgba(34,197,94,0.15); color: #4ade80; }
.phase.in_progress .phase-tag { background: rgba(47,111,212,0.15); color: var(--blue-l); }
.phase.todo .phase-tag { background: rgba(107,127,163,0.1); color: var(--silver); }

.phase-items { padding: 12px 14px 12px 32px; display: flex; flex-direction: column; gap: 6px; }
.phase-items li {
font-size: 12px; color: var(--text-m); list-style: none;
position: relative; padding-left: 14px; line-height: 1.5;
}
.phase.done .phase-items li::before { content: '✓'; position: absolute; left: 0; color: var(--green); font-size: 11px; font-weight: 700; }
.phase.in_progress .phase-items li::before { content: '›'; position: absolute; left: 0; color: var(--blue-l); font-size: 14px; }
.phase.todo .phase-items li::before { content: '–'; position: absolute; left: 0; color: var(--border2); }

.livrables-ttl {
font-size: 10px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; color: var(--text-m);
margin: 20px 0 10px;
}
.livrable-item {
display: flex;
align-items: center;
justify-content: space-between;
padding: 9px 12px;
border: 1px solid var(--border);
border-radius: 7px;
margin-bottom: 6px;
background: var(--bg3);
}
.livrable-name { font-size: 12px; color: var(--text); font-weight: 500; }
.livrable-type { font-size: 10px; color: var(--text-m); font-family: 'DM Mono', monospace; }
.btn-open {
background: var(--blue-dim);
border: 1px solid rgba(47,111,212,0.3);
color: var(--blue-l);
padding: 4px 12px;
border-radius: 5px;
font-size: 11px;
font-weight: 600;
cursor: pointer;
text-decoration: none;
font-family: 'Sora', sans-serif;
transition: all 0.15s;
}
.btn-open:hover { background: var(--blue); color: #fff; }

.stack-bloc {
margin-top: 16px; padding: 12px 14px;
background: var(--bg3);
border: 1px solid var(--border);
border-radius: 8px;
}
.stack-lbl { font-size: 10px; color: var(--text-m); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.stack-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--blue-l); line-height: 1.6; }

.next-step-bloc {
background: rgba(245,158,11,0.07);
border: 1px solid rgba(245,158,11,0.2);
border-radius: 7px;
padding: 10px 14px;
margin-bottom: 16px;
}
.next-step-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--orange); margin-bottom: 4px; }
.next-step-val { font-size: 12px; color: var(--text); line-height: 1.5; }

.edit-bar {
display: flex; gap: 8px; flex-wrap: wrap;
padding: 14px 28px;
border-top: 1px solid var(--border);
background: var(--bg3);
}
.btn-edit { background: var(--bg4); border: 1px solid var(--border2); color: var(--silver); padding: 7px 16px; border-radius: 6px; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-edit:hover { border-color: var(--blue); color: var(--blue-l); }

.form-modal .modal-body { padding: 24px 28px; max-height: 75vh; overflow-y: auto; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-m); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select {
width: 100%; background: var(--bg3); border: 1px solid var(--border);
border-radius: 7px; color: var(--text); padding: 9px 13px;
font-family: 'Sora', sans-serif; font-size: 13px; outline: none;
transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--blue); }
.form-group select option { background: var(--bg2); }
.form-group textarea { min-height: 70px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.btn-submit { width: 100%; background: var(--blue); color: #fff; border: none; padding: 12px; border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 6px; }
.btn-submit:hover { background: var(--blue-l); }

/* GITHUB SYNC */
.gh-line {
font-size: 11px;
font-family: 'DM Mono', monospace;
color: #4ade80;
line-height: 1.5;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.gh-line.err { color: var(--orange); }
.gh-line.wait { color: var(--text-m); }
.gh-meta {
font-size: 11px;
color: var(--text-m);
font-family: 'DM Mono', monospace;
margin-bottom: 10px;
line-height: 1.6;
}
.gh-meta.err { color: var(--orange); }
.commit-item {
display: flex;
gap: 12px;
align-items: baseline;
padding: 7px 12px;
border: 1px solid var(--border);
border-radius: 7px;
margin-bottom: 5px;
background: var(--bg3);
}
.commit-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--blue-l); flex-shrink: 0; }
.commit-msg { font-size: 12px; color: var(--text); line-height: 1.5; }

/* PROMPT DE REPRISE */
.prompt-bloc { margin-top: 20px; }
.prompt-pre {
white-space: pre-wrap;
word-break: break-word;
background: #0a0e14;
border: 1px solid var(--border2);
border-radius: 8px;
padding: 14px 16px;
font-family: 'DM Mono', monospace;
font-size: 11.5px;
color: #c9d4e8;
line-height: 1.65;
max-height: 320px;
overflow-y: auto;
}
.btn-copy {
background: var(--blue);
color: #fff;
border: none;
padding: 8px 18px;
border-radius: 7px;
font-family: 'Sora', sans-serif;
font-size: 12px;
font-weight: 700;
cursor: pointer;
margin-bottom: 10px;
transition: background 0.2s;
}
.btn-copy:hover { background: var(--blue-l); }
.btn-copy.ok { background: var(--green); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

@media(max-width:640px){
header, .toolbar, .main, .flash-ia { padding-left: 16px; padding-right: 16px; margin-left: 0; margin-right: 0; }
.grid { grid-template-columns: 1fr; }
.form-row { grid-template-columns: 1fr; }
.modal-hdr, .modal-body, .edit-bar { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body>

<header>
<div class="logo">Cockpit <span>Projets</span> — Karim Zoubdane 2026</div>
<div class="header-stats">
<div class="hstat"><div class="hstat-val" id="s-total">0</div><div class="hstat-lbl">Projets</div></div>
<div class="hstat"><div class="hstat-val" id="s-actifs">0</div><div class="hstat-lbl">Actifs</div></div>
<div class="hstat"><div class="hstat-val" id="s-avg">0%</div><div class="hstat-lbl">Avancement moy.</div></div>
<div class="hstat"><div class="hstat-val" id="s-gh">—</div><div class="hstat-lbl">Synchro GitHub</div></div>
<button class="btn-ghost btn" onclick="syncGitHub(true)" title="Recharger les donnees GitHub">&#10227; GitHub</button>
<button class="btn" onclick="openAdd()">+ Nouveau projet</button>
</div>
</header>

<div class="flash-ia" id="flash-ia">
<div class="flash-header">
<div class="flash-title">Flash IA — Rapport quotidien</div>
<div class="flash-date" id="flash-date"></div>
<button class="btn-ghost" style="padding: 4px 12px; font-size: 11px;" onclick="refreshFlash()">Rafraichir</button>
</div>
<div class="flash-content" id="flash-content">
<div class="loading">Chargement du rapport matinal...</div>
</div>
</div>

<div class="toolbar">
<button class="chip active" onclick="filter('all',this)">Tous</button>
<button class="chip" onclick="filter('actif',this)">En cours</button>
<button class="chip" onclick="filter('planifie',this)">Planifies</button>
<button class="chip" onclick="filter('termine',this)">Termines</button>
<button class="chip" onclick="filter('agent',this)">Agents IA</button>
<button class="chip" onclick="filter('apps',this)">Apps & Outils</button>
<input class="search-input" type="text" placeholder="Rechercher un projet..." oninput="search(this.value)">
</div>

<div class="main" id="main"></div>

<div class="overlay" id="ov-detail" onclick="closeOv(event,'ov-detail')">
<div class="modal">
<div class="modal-hdr" id="d-hdr"></div>
<div class="modal-body" id="d-body"></div>
<div class="edit-bar">
<button class="btn-edit" id="btn-edit-proj">Modifier ce projet</button>
<button class="btn-edit" id="btn-del-proj" style="color:#ef4444;border-color:#ef4444">Supprimer</button>
</div>
</div>
</div>

<div class="overlay form-modal" id="ov-form" onclick="closeOv(event,'ov-form')">
<div class="modal">
<div class="modal-hdr">
<div class="modal-hdr-text">
<div class="modal-hdr-title" id="form-title">Nouveau projet</div>
<div class="modal-hdr-sub">Remplissez les champs</div>
</div>
<button class="btn-x" onclick="closeForm()">X</button>
</div>
<div class="modal-body">
<input type="hidden" id="f-id">
<div class="form-group">
<label>Nom du projet</label>
<input type="text" id="f-title" placeholder="Ex: Plateforme Web Voyages21.com">
</div>
<div class="form-group">
<label>Description courte</label>
<textarea id="f-desc" placeholder="Expliquez l'objet du projet..."></textarea>
</div>
<div class="form-row">
<div class="form-group">
<label>Statut</label>
<select id="f-status">
<option value="actif">En cours</option>
<option value="planifie">Planifie</option>
<option value="termine">Termine</option>
</select>
</div>
<div class="form-group">
<label>Categorie</label>
<select id="f-cat">
<option value="business">Business Voyages 21</option>
<option value="eco">Ecotourisme & Immobilier</option>
<option value="web">Creation de Sites Web</option>
<option value="apps">Applications & Outils IA</option>
<option value="agent">Armee des Anges — Agents IA</option>
<option value="veille">Veille & Expertise</option>
</select>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>Avancement (%)</label>
<input type="number" id="f-prog" min="0" max="100" placeholder="0">
</div>
<div class="form-group">
<label>Prochaine etape</label>
<input type="text" id="f-next" placeholder="Ex: Configurer HubSpot CRM">
</div>
</div>
<div class="form-group">
<label>Stack technologique</label>
<input type="text" id="f-stack" placeholder="Ex: Next.js · Sanity.io · Vercel">
</div>
<button class="btn-submit" onclick="saveProject()">Enregistrer le projet</button>

function persistProjects() {
localStorage.setItem('cockpit_projects', JSON.stringify(projects));
}

/* Incrementer DATA_VERSION a chaque modification de defaultProjects :
   les fiches par defaut sont alors rechargees chez l'utilisateur,
   les projets ajoutes a la main (id = timestamp) sont conserves. */
const DATA_VERSION = 2;

function loadProjects() {
const stored = localStorage.getItem('cockpit_projects');
const storedVersion = localStorage.getItem('cockpit_data_version');
if (stored && storedVersion == DATA_VERSION) {
projects = JSON.parse(stored);
} else {
let userAdded = [];
if (stored) {
try { userAdded = JSON.parse(stored).filter(p => p.id > 100000); } catch(e) {}
}
projects = JSON.parse(JSON.stringify(defaultProjects)).concat(userAdded);
localStorage.setItem('cockpit_data_version', DATA_VERSION);
persistProjects();
}
}

function calcProg(p) {
if (!p.phases || p.phases.length === 0) return 0;
let total = 0, done = 0;
p.phases.forEach(ph => {
const n = ph.items.length;
total += n;
if (ph.state === 'done') done += n;
else if (ph.state === 'in_progress') done += Math.ceil(n * 0.4);
});
return total === 0 ? 0 : Math.round((done / total) * 100);
}

const CATS = [
{ key:'business', label:'Business Voyages 21' },
{ key:'eco', label:'Ecotourisme & Immobilier' },
{ key:'web', label:'Creation de Sites Web' },
{ key:'apps', label:'Applications & Outils IA' },
{ key:'agent', label:'Armee des Anges — Agents IA' },
{ key:'veille', label:'Veille & Expertise' }
];

let currentFilter = 'all';
let currentSearch = '';

function render() {
const main = document.getElementById('main');
const visible = projects.filter(p => {
const matchF = currentFilter === 'all' || p.status === currentFilter || p.cat === currentFilter;
const matchS = !currentSearch || p.title.toLowerCase().includes(currentSearch) || (p.desc && p.desc.toLowerCase().includes(currentSearch));
return matchF && matchS;
});
const grouped = {};
CATS.forEach(c => { grouped[c.key] = []; });
visible.forEach(p => { if (grouped[p.cat]) grouped[p.cat].push(p); });
let html = '';
CATS.forEach(c => {
const items = grouped[c.key];
if (!items.length) return;
html += `<div class="section-block"><div class="section-label">${c.label} — ${items.length} projet${items.length>1?'s':''}</div><div class="grid">${items.map(cardHTML).join('')}</div></div>`;
});
main.innerHTML = html || '<div style="text-align:center;color:var(--text-m);padding:60px 0;">Aucun projet trouve</div>';
updateStats();
}

function cardHTML(p) {
const prog = calcProg(p);
const fillClass = prog >= 70 ? 'high' : prog >= 30 ? 'med' : 'low';
const badgeLabel = p.status === 'actif' ? 'En cours' : p.status === 'planifie' ? 'Planifie' : 'Termine';
const phases = p.phases || [];
const donePh = phases.filter(ph => ph.state === 'done').length;
let ghLine = '';
if (p.github) {
const g = ghData[p.github];
if (g && g.error) ghLine = `<div class="gh-line err">&#10227; GitHub indisponible (reessayer plus tard)</div>`;
else if (g && g.pushed) ghLine = `<div class="gh-line" title="${escapeHtml(g.commits && g.commits[0] ? g.commits[0].m : '')}">&#10227; GitHub · MAJ ${timeAgo(g.pushed)}${g.commits && g.commits[0] ? ' — ' + escapeHtml(g.commits[0].m.substring(0,42)) : ''}</div>`;
else ghLine = `<div class="gh-line wait">&#10227; GitHub : synchronisation...</div>`;
}
return `<div class="card" onclick="openDetail(${p.id})">
<div class="card-top"><div class="card-title">${escapeHtml(p.title)}</div><span class="badge ${p.status}">${badgeLabel}</span></div>
<div class="card-desc">${escapeHtml(p.desc.substring(0,100))}...</div>
<div><div class="prog-row"><span>${donePh}/${phases.length} phases</span><span class="prog-pct">${prog}%</span></div><div class="prog-bar"><div class="prog-fill ${fillClass}" style="width:${prog}%"></div></div></div>
${ghLine}
<div class="card-footer"><span>Prochaine : ${p.nextStep ? escapeHtml(p.nextStep.substring(0,40))+'…' : '—'}</span><span class="link-detail">Voir &rsaquo;</span></div>
</div>`;
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

function updateStats() {
document.getElementById('s-total').textContent = projects.length;
document.getElementById('s-actifs').textContent = projects.filter(p => p.status === 'actif').length;
const avg = projects.length ? Math.round(projects.reduce((s,p) => s + calcProg(p), 0) / projects.length) : 0;
document.getElementById('s-avg').textContent = avg + '%';
}

function openDetail(id) {
const p = projects.find(x => x.id === id);
if (!p) return;
const prog = calcProg(p);
const phases = p.phases || [];
const donePh = phases.filter(ph => ph.state === 'done').length;
const fillClass = prog >= 70 ? 'high' : prog >= 30 ? 'med' : 'low';
const badgeLabel = p.status === 'actif' ? 'En cours' : p.status === 'planifie' ? 'Planifie' : 'Termine';
document.getElementById('d-hdr').innerHTML = `<div class="modal-hdr-text"><div class="modal-hdr-title">${escapeHtml(p.title)}</div><div class="modal-hdr-sub">${escapeHtml(p.desc)}</div><span class="badge ${p.status}" style="margin-top:10px;display:inline-flex">${badgeLabel}</span></div><button class="btn-x" onclick="closeModal()">X</button>`;
const phasesHTML = phases.map(ph => `<div class="phase ${ph.state}"><div class="phase-hdr"><div class="dot"></div><div class="phase-name">${escapeHtml(ph.name)}</div><span class="phase-tag">${ph.state==='done'?'Termine':ph.state==='in_progress'?'En cours':'A faire'}</span></div><ul class="phase-items">${ph.items.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></div>`).join('');
const livsHTML = (p.livrables && p.livrables.length) ? `<div class="livrables-ttl">Livrables</div>${p.livrables.map(l => `<div class="livrable-item"><div><div class="livrable-name">${escapeHtml(l.name)}</div><div class="livrable-type">${escapeHtml(l.type)}</div></div><a class="btn-open" href="${l.url}" target="_blank">Ouvrir</a></div>`).join('')}` : '';
const allRefs = [];
if (p.github) allRefs.push({name:'Depot GitHub', type:'github.com/' + p.github, url:'https://github.com/' + p.github});
(p.refs || []).forEach(r => allRefs.push(r));
const refsHTML = allRefs.length ? `<div class="livrables-ttl">References</div>${allRefs.map(r => `<div class="livrable-item"><div><div class="livrable-name">${escapeHtml(r.name)}</div><div class="livrable-type">${escapeHtml(r.type)}</div></div><a class="btn-open" href="${r.url}" target="_blank">Ouvrir</a></div>`).join('')}` : '';
let ghHTML = '';
if (p.github) {
const g = ghData[p.github];
ghHTML = `<div class="livrables-ttl" style="margin-top:20px">Dernieres avancees — GitHub (mise a jour automatique)</div>`;
if (g && !g.error && g.commits) {
ghHTML += `<div class="gh-meta">Derniere activite : ${timeAgo(g.pushed)} · ${g.issues} issue(s) ouverte(s) · branche par defaut : ${escapeHtml(g.branch || 'main')}</div>` + g.commits.map(c => `<div class="commit-item"><span class="commit-date">${c.d.substring(0,10)}</span><span class="commit-msg">${escapeHtml(c.m)}</span></div>`).join('');
} else if (g && g.error) {
ghHTML += `<div class="gh-meta err">Donnees GitHub momentanement indisponibles — cliquez sur &#10227; GitHub en haut de page pour reessayer.</div>`;
} else {
ghHTML += `<div class="gh-meta">Synchronisation en cours...</div>`;
}
}
const promptHTML = `<div class="prompt-bloc"><div class="livrables-ttl">Prompt de reprise IA — a coller dans Claude, ChatGPT, Gemini...</div><button class="btn-copy" onclick="copyPrompt(${p.id}, this)">Copier le prompt</button><div class="prompt-pre" id="prompt-pre-${p.id}">${escapeHtml(buildPrompt(p))}</div></div>`;
document.getElementById('d-body').innerHTML = `<div class="modal-prog-bloc"><div class="big-pct">${prog}<span>%</span></div><div class="prog-detail"><div class="prog-detail-label">${donePh} phase${donePh>1?'s':''} terminee${donePh>1?'s':''} sur ${phases.length}</div><div class="prog-detail-bar"><div class="prog-detail-fill ${fillClass}" style="width:${prog}%"></div></div></div></div>${p.nextStep ? `<div class="next-step-bloc"><div class="next-step-lbl">Prochaine etape</div><div class="next-step-val">${escapeHtml(p.nextStep)}</div></div>` : ''}${refsHTML}${ghHTML}<div class="phases-ttl" style="margin-top:20px">Planning & Etapes</div>${phasesHTML}${p.stack ? `<div class="stack-bloc"><div class="stack-lbl">Stack</div><div class="stack-val">${escapeHtml(p.stack)}</div></div>` : ''}${livsHTML}${promptHTML}`;
document.getElementById('btn-edit-proj').onclick = () => { closeModal(); openEdit(id); };
document.getElementById('btn-del-proj').onclick = () => { if(confirm('Supprimer ce projet ?')) { projects = projects.filter(x=>x.id!==id); persistProjects(); closeModal(); render(); }};
document.getElementById('ov-detail').classList.add('open');
}

function saveProject() {
const id = document.getElementById('f-id').value;
const title = document.getElementById('f-title').value.trim();
if (!title) { alert('Le nom du projet est obligatoire.'); return; }
if (id) {
const idx = projects.findIndex(x => x.id == id);
if (idx > -1) {
projects[idx].title = title;
projects[idx].desc = document.getElementById('f-desc').value;
projects[idx].status = document.getElementById('f-status').value;
projects[idx].cat = document.getElementById('f-cat').value;
projects[idx].nextStep = document.getElementById('f-next').value;
projects[idx].stack = document.getElementById('f-stack').value;
}
} else {
projects.push({
id: Date.now(),
cat: document.getElementById('f-cat').value,

}

function refreshFlash() { loadFlashReport(); }

/* ============ SYNCHRO GITHUB (API publique, sans token) ============ */
const GH_CACHE_KEY = 'cockpit_gh_cache';
const GH_TTL = 3600000; /* cache 1h : l'API publique est limitee a 60 requetes/heure */
let ghData = {};

try { ghData = JSON.parse(localStorage.getItem(GH_CACHE_KEY)) || {}; } catch(e) { ghData = {}; }

function timeAgo(iso) {
const diff = Date.now() - new Date(iso).getTime();
const min = Math.floor(diff / 60000);
if (min < 1) return "a l'instant";
if (min < 60) return 'il y a ' + min + ' min';
const h = Math.floor(min / 60);
if (h < 24) return 'il y a ' + h + ' h';
const d = Math.floor(h / 24);
if (d < 31) return 'il y a ' + d + ' jour' + (d > 1 ? 's' : '');
const mo = Math.floor(d / 30);
return 'il y a ' + mo + ' mois';
}

async function syncGitHub(force) {
const slugs = [...new Set(projects.filter(p => p.github).map(p => p.github))];
const now = Date.now();
const toFetch = slugs.filter(s => force || !ghData[s] || ghData[s].error || (now - ghData[s].ts) > GH_TTL);
if (!toFetch.length) { updateGhStat(); return; }
document.getElementById('s-gh').textContent = '...';
await Promise.all(toFetch.map(async slug => {
try {
const [repoRes, commitsRes] = await Promise.all([
fetch('https://api.github.com/repos/' + slug),
fetch('https://api.github.com/repos/' + slug + '/commits?per_page=5')
]);
if (!repoRes.ok || !commitsRes.ok) throw new Error('HTTP');
const repo = await repoRes.json();
const commits = await commitsRes.json();
ghData[slug] = {
ts: now,
pushed: repo.pushed_at,
issues: repo.open_issues_count,
branch: repo.default_branch,
commits: (Array.isArray(commits) ? commits : []).map(c => ({
m: (c.commit.message || '').split('\n')[0],
d: c.commit.author ? c.commit.author.date : ''
}))
};
} catch(e) {
if (!ghData[slug] || !ghData[slug].pushed) ghData[slug] = { ts: now, error: true };
}
}));
try { localStorage.setItem(GH_CACHE_KEY, JSON.stringify(ghData)); } catch(e) {}
updateGhStat();
render();
}

function updateGhStat() {
const slugs = projects.filter(p => p.github).map(p => p.github);
const ok = slugs.filter(s => ghData[s] && !ghData[s].error).length;
document.getElementById('s-gh').textContent = ok + '/' + slugs.length;
}

/* ============ PROMPT DE REPRISE IA ============ */
function buildPrompt(p) {
const g = p.github ? ghData[p.github] : null;
let s = 'Tu es un expert senior (developpement, strategie et automatisation IA). Je te confie la reprise du projet « ' + p.title + ' » pour le faire evoluer. Voici tout le contexte.\n\n';
s += 'QUI JE SUIS\nKarim Zoubdane, fondateur de Voyages 21, agence de voyages sur mesure au Maroc depuis 2000 (site : https://voyages21.vercel.app). Je developpe mes projets en collaboration avec des IA.\n\n';
s += 'LE PROJET\n' + p.desc + '\n\n';
if (p.stack) s += 'STACK / OUTILS\n' + p.stack + '\n\n';
const done = [], enc = [], todo = [];
(p.phases || []).forEach(ph => {
const t = ph.name + ' : ' + ph.items.join(' ; ');
if (ph.state === 'done') done.push(t);
else if (ph.state === 'in_progress') enc.push(t);
else todo.push(t);
});
if (done.length) s += 'DEJA REALISE\n- ' + done.join('\n- ') + '\n\n';
if (enc.length) s += 'EN COURS\n- ' + enc.join('\n- ') + '\n\n';
if (todo.length) s += 'RESTE A FAIRE\n- ' + todo.join('\n- ') + '\n\n';
if (p.nextStep) s += 'PROCHAINE ETAPE PRIORITAIRE\n' + p.nextStep + '\n\n';
const refs = [];
if (p.github) refs.push('Depot GitHub : https://github.com/' + p.github + (g && g.branch ? ' (branche ' + g.branch + ')' : ''));
(p.refs || []).forEach(r => refs.push(r.name + ' : ' + r.url));
(p.livrables || []).forEach(l => refs.push(l.name + ' : ' + l.url));
if (refs.length) s += 'REFERENCES\n- ' + refs.join('\n- ') + '\n\n';
if (g && !g.error && g.commits && g.commits.length) s += 'DERNIERS COMMITS GITHUB (etat reel du code)\n- ' + g.commits.map(c => (c.d ? c.d.substring(0,10) : '') + ' : ' + c.m).join('\n- ') + '\n\n';
if (p.promptNotes) s += 'REGLES SPECIFIQUES A RESPECTER\n' + p.promptNotes + '\n\n';
s += 'METHODE DE TRAVAIL\n- Si un point est ambigu, pose-moi tes questions avant d\'agir.\n- Commence par un etat des lieux puis propose un plan d\'action en 3 a 5 etapes, et attends ma validation avant d\'executer.\n- Travaille par petites etapes validees, sans rien casser de l\'existant.\n- A la fin de la session, resume ce qui a ete fait et la prochaine etape.';
return s;
}

function copyPrompt(id, btn) {
const p = projects.find(x => x.id === id);
if (!p) return;
const text = buildPrompt(p);
function ok() { btn.textContent = 'Copie ✓'; btn.classList.add('ok'); setTimeout(() => { btn.textContent = 'Copier le prompt'; btn.classList.remove('ok'); }, 2000); }
if (navigator.clipboard && navigator.clipboard.writeText) {
navigator.clipboard.writeText(text).then(ok).catch(() => fallbackCopy(text, ok));
} else {
fallbackCopy(text, ok);
}
}

function fallbackCopy(text, ok) {
const ta = document.createElement('textarea');
ta.value = text;
ta.style.position = 'fixed';
ta.style.opacity = '0';
document.body.appendChild(ta);
ta.select();
try { document.execCommand('copy'); ok(); } catch(e) { alert('Copie impossible — selectionnez le texte manuellement.'); }
document.body.removeChild(ta);
}

loadProjects();
render();
loadFlashReport();
syncGitHub(false);
